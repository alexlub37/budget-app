<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Alexandre V4.7.3</title>
<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:12px 12px 90px}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px}
.big{font-size:48px;font-weight:800}
.btn{background:#dbeafe;padding:14px;border-radius:14px;text-align:center;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px;border-top:1px solid #ccc}
.section{display:none}
.section.active{display:block}
</style>
</head>
<body>

<div id="home" class="section active">
<h2>Accueil</h2>

<div class="card">
<div>Argent restant</div>
<div class="big" id="reste">0 €</div>
</div>

<div class="card">
<div class="grid">
<div class="btn" onclick="quickAdd('Courses')">Courses</div>
<div class="btn" onclick="quickAdd('Boulangerie')">Boulangerie</div>
<div class="btn" onclick="quickAdd('Snack')">Snack</div>
<div class="btn" onclick="quickAdd('Carburant')">Carburant</div>
<div class="btn" onclick="quickAdd('Santé')">Santé</div>
<div class="btn" onclick="quickAdd('Virement')">Virement</div>
</div>
</div>

<div class="card">
<div>Salaire : <span id="salaire"></span> €</div>
<div>Épargne : <span id="epargne"></span> €</div>
<div>Sécurité : <span id="secu"></span> €</div>
<div>Budget : <span id="budget"></span> €</div>
<div>Fixes : <span id="fixes"></span> €</div>
<div>Variables : <span id="variables"></span> €</div>
<div>Revenus : <span id="revenus"></span> €</div>
</div>

</div>

<div id="summary" class="section">
<h2>Gestion</h2>
<div class="card">
<input id="inputSalaire" placeholder="Salaire"><br><br>
<input id="inputEpargne" placeholder="Epargne"><br><br>
<input id="inputSecu" placeholder="Sécurité"><br><br>
<button onclick="save()">Enregistrer</button>
</div>
</div>

<div class="nav">
<button onclick="show('home')">Accueil</button>
<button onclick="show('summary')">Gestion</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('budget')) || {
salaire:3000,epargne:600,secu:600,fixes:1000,variables:0,revenus:0
}

function calc(){
let budget = data.salaire - data.epargne - data.secu
let reste = budget - data.fixes - data.variables + data.revenus

document.getElementById('reste').innerText = reste + " €"
document.getElementById('salaire').innerText = data.salaire
document.getElementById('epargne').innerText = data.epargne
document.getElementById('secu').innerText = data.secu
document.getElementById('budget').innerText = budget
document.getElementById('fixes').innerText = data.fixes
document.getElementById('variables').innerText = data.variables
document.getElementById('revenus').innerText = data.revenus
}

function quickAdd(label){
let val = prompt("Montant ?");
if(!val) return;
data.variables += parseFloat(val)
save()
}

function save(){
data.salaire = parseFloat(document.getElementById('inputSalaire').value) || data.salaire
data.epargne = parseFloat(document.getElementById('inputEpargne').value) || data.epargne
data.secu = parseFloat(document.getElementById('inputSecu').value) || data.secu
localStorage.setItem('budget', JSON.stringify(data))
calc()
}

function show(tab){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(tab).classList.add('active')
}

calc()
</script>

</body>
</html>
