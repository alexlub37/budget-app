<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Alexandre V4.6</title>

<style>
body{font-family:Arial;margin:0;background:#f6f7fb}
.app{padding:15px}
h1{margin-bottom:10px}
.card{background:white;border-radius:12px;padding:15px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.big{font-size:20px;font-weight:bold}
.green{color:#2e7d32}
.red{color:#c62828}
.blue{color:#1565c0}
button{width:100%;padding:10px;border:none;border-radius:10px;background:#2f6df6;color:white;font-weight:bold;margin-top:5px}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc}

.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;border-top:1px solid #ccc}
.nav div{flex:1;text-align:center;padding:10px;cursor:pointer}
</style>
</head>

<body>

<div class="app" id="app"></div>

<div class="nav">
<div onclick="page='accueil';render()">Accueil</div>
<div onclick="page='ajouter';render()">Ajouter</div>
<div onclick="page='fixes';render()">Fixes</div>
<div onclick="page='reglages';render()">Réglages</div>
</div>

<script>

let page="accueil"

// DATA
function getOps(){return JSON.parse(localStorage.getItem("ops")||"[]")}
function saveOps(d){localStorage.setItem("ops",JSON.stringify(d))}
function getFixes(){return JSON.parse(localStorage.getItem("fixes")||"[]")}
function saveFixes(d){localStorage.setItem("fixes",JSON.stringify(d))}

// CALCUL
function total(type){
return getOps().filter(o=>o.type===type).reduce((t,o)=>t+Number(o.montant),0)
}

function totalFixes(){
return getFixes().reduce((t,f)=>t+Number(f.montant),0)
}

function calcul(){
const salaire=Number(localStorage.getItem("salaire")||2200)
const pctEpargne=Number(localStorage.getItem("epargne")||15)
const pctSecu=Number(localStorage.getItem("secu")||10)

const epargne=salaire*pctEpargne/100
const securite=salaire*pctSecu/100
const budgetPrevu=salaire-epargne-securite

const revenus=total("Revenu")
const variables=total("Dépense")
const fixes=totalFixes()

const dispoReel=budgetPrevu+revenus-fixes-variables

return{ salaire,epargne,securite,budgetPrevu,revenus,variables,fixes,dispoReel}
}

// ACCUEIL
function accueil(){
const c=calcul()
return `
<h1>Budget</h1>

<div class="grid">
<div class="card"><div>Budget prévu</div><div class="big blue">${c.budgetPrevu}€</div></div>
<div class="card"><div>Fixes</div><div class="big red">${c.fixes}€</div></div>

<div class="card"><div>Variables</div><div class="big red">${c.variables}€</div></div>
<div class="card"><div>Revenus</div><div class="big green">${c.revenus}€</div></div>

<div class="card" style="grid-column:1/3">
<div>Disponible réel</div>
<div class="big green">${c.dispoReel}€</div>
</div>
</div>

<div class="card">
<div>Boutons rapides</div>

<div class="quick">
<button onclick="quick('Courses')">Courses</button>
<button onclick="quick('Essence')">Essence</button>
<button onclick="quick('Plaisir')">Plaisir</button>
<button onclick="quick('Maison')">Maison</button>
<button onclick="quick('Enfants')">Enfants</button>
<button onclick="quick('Divers')">Divers</button>
</div>
</div>
`
}

// QUICK
function quick(cat){
const montant=prompt("Montant pour "+cat)
if(!montant)return

const ops=getOps()
ops.push({desc:cat,montant:Number(montant),type:"Dépense"})
saveOps(ops)
render()
}

// AJOUT
function ajouter(){
return `
<h1>Ajouter</h1>
<input id="desc" placeholder="Description">
<input id="montant" placeholder="Montant">
<select id="type">
<option>Dépense</option>
<option>Revenu</option>
</select>
<button onclick="addOp()">Valider</button>
`
}

function addOp(){
const ops=getOps()
ops.push({
desc:document.getElementById("desc").value,
montant:Number(document.getElementById("montant").value),
type:document.getElementById("type").value
})
saveOps(ops)
render()
}

// FIXES
function fixes(){
const list=getFixes().map((f,i)=>`
<div class="card">
${f.desc} - ${f.montant}€
<button onclick="delFix(${i})">Supprimer</button>
</div>`).join("")

return `
<h1>Fixes</h1>
<input id="fdesc" placeholder="Libellé">
<input id="fmontant" placeholder="Montant">
<button onclick="addFix()">Ajouter</button>
${list}
`
}

function addFix(){
const f=getFixes()
f.push({desc:document.getElementById("fdesc").value,montant:Number(document.getElementById("fmontant").value)})
saveFixes(f)
render()
}

function delFix(i){
const f=getFixes()
f.splice(i,1)
saveFixes(f)
render()
}

// REGLAGES
function reglages(){
const salaire=localStorage.getItem("salaire")||2200
const epargne=localStorage.getItem("epargne")||15
const secu=localStorage.getItem("secu")||10

return `
<h1>Réglages</h1>

<div class="card">
Salaire
<input id="sal" value="${salaire}">
% Épargne
<input id="epar" value="${epargne}">
% Sécurité
<input id="sec" value="${secu}">
<button onclick="saveReglages()">Enregistrer</button>
</div>
`
}

function saveReglages(){
localStorage.setItem("salaire",document.getElementById("sal").value)
localStorage.setItem("epargne",document.getElementById("epar").value)
localStorage.setItem("secu",document.getElementById("sec").value)
render()
}

// RENDER
function render(){
if(page==="accueil")app.innerHTML=accueil()
if(page==="ajouter")app.innerHTML=ajouter()
if(page==="fixes")app.innerHTML=fixes()
if(page==="reglages")app.innerHTML=reglages()
}

render()

</script>
</body>
</html>
