<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YoNo Budget V6.8.2</title>

<style>
:root{
  --yono-accent:#2563eb;
}
body{font-family:Arial;background:#f5f7fb;margin:0;padding:10px}
.btn{padding:10px;border-radius:10px;border:1px solid var(--yono-accent);margin:5px}
.btn-primary{background:var(--yono-accent);color:#fff}
</style>
</head>

<body>

<h2>YoNo Budget</h2>

<div>
<button class="btn btn-primary">Test bouton</button>
</div>

<div>
<h3>🎨 Choisir une couleur</h3>
<div id="palette" style="display:flex;flex-wrap:wrap;gap:10px"></div>
</div>

<script>
const colors = ["#4CAF50","#2196F3","#FF5722","#9C27B0","#FFC107","#00BCD4","#E91E63","#8BC34A","#FF9800","#607D8B","#3F51B5","#009688","#F44336","#795548","#CDDC39","#673AB7"];

const palette = document.getElementById("palette");

colors.forEach(c=>{
  const el=document.createElement("div");
  el.style.width="30px";
  el.style.height="30px";
  el.style.background=c;
  el.style.borderRadius="8px";
  el.style.cursor="pointer";
  el.onclick=()=>{
    localStorage.setItem("yonoColor",c);
    document.documentElement.style.setProperty('--yono-accent',c);
  };
  palette.appendChild(el);
});

const saved = localStorage.getItem("yonoColor");
if(saved){
  document.documentElement.style.setProperty('--yono-accent',saved);
}
</script>

</body>
</html>
